<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DiaWolf — Coming Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #030a1e;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    #scene {
      width: 100%;
      min-height: 100dvh;
      background: radial-gradient(ellipse at 62% 26%, #1f4a9c 0%, #0f2266 22%, #07142f 54%, #030a1e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }

    .icon-stack {
      position: relative;
      width: min(392px, 100vw);
      aspect-ratio: 1;
      flex-shrink: 0;
    }

    .icon-stack img,
    .icon-stack .line-wrap {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .layer-base {
      display: block;
      -webkit-mask: linear-gradient(to bottom, transparent 0, #000 7%, #000 93%, transparent 100%);
      mask: linear-gradient(to bottom, transparent 0, #000 7%, #000 93%, transparent 100%);
    }

    .line-wrap { display: block; }

    .layer-line1 {
      filter: drop-shadow(0 0 5px rgba(0,255,136,0.9)) drop-shadow(0 0 14px rgba(0,220,100,0.5));
    }
    .layer-line2 {
      filter: drop-shadow(0 0 4px rgba(0,255,122,0.72)) drop-shadow(0 0 11px rgba(0,200,90,0.42));
    }
    .layer-figure {
      filter: drop-shadow(0 0 9px rgba(85,160,255,0.7)) drop-shadow(0 0 20px rgba(50,120,255,0.32));
    }

    .wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      margin-top: 24px;
      position: relative;
    }

    .wm-name {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.012em;
      text-shadow: 0 2px 40px rgba(120,178,255,0.4);
    }

    .wm-sub {
      font-size: 12px;
      font-weight: 500;
      color: rgba(152,198,255,0.62);
      letter-spacing: 0.19em;
      text-transform: uppercase;
    }

    .badge-soon {
      margin-top: 18px;
      font-size: 11px;
      font-weight: 600;
      color: #7BB1DB;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      padding: 6px 15px;
      border: 1px solid rgba(123,177,219,0.45);
      border-radius: 100px;
    }

    .appstore-btn {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      margin-top: 14px;
      background: #000;
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 12px;
      padding: 9px 17px 9px 15px;
      cursor: default;
    }

    .appstore-text { display: flex; flex-direction: column; line-height: 1.15; text-align: left; }
    .appstore-text .pre  { font-size: 9px;  color: #fff; letter-spacing: 0.02em; opacity: 0.82; }
    .appstore-text .main { font-size: 18px; font-weight: 600; color: #fff; letter-spacing: 0.01em; }

    .link-row {
      display: flex;
      gap: 24px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .subtle-link {
      font-size: 11px;
      font-weight: 500;
      color: rgba(152,198,255,0.6);
      letter-spacing: 0.04em;
      text-decoration: none;
      border-bottom: 1px solid rgba(152,198,255,0.28);
      padding-bottom: 1px;
    }
    .subtle-link:hover { color: rgba(152,198,255,0.9); }

    @keyframes dwRevealLeft {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0% 0 0); }
    }
    @keyframes dwSlideIn {
      from { transform: translateX(-440px); opacity: 0; }
      60%  { opacity: 1; }
      to   { transform: translateX(0); opacity: 1; }
    }
    @keyframes dwSunRise {
      from { transform: translateY(128px) scale(0.62); opacity: 0; }
      55%  { opacity: 1; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes dwFadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes dwSunPulse {
      0%, 100% { filter: drop-shadow(0 0 18px rgba(255,205,0,0.55)); }
      50%      { filter: drop-shadow(0 0 34px rgba(255,216,0,0.85)) drop-shadow(0 0 58px rgba(255,150,0,0.4)); }
    }
    @keyframes dwLinePulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.74; }
    }

    .anim-line1  { animation: dwRevealLeft 2.75s ease-out 0.30s both, dwLinePulse 7s 4.25s ease-in-out infinite; }
    .anim-line2  { animation: dwRevealLeft 2.75s ease-out 0.43s both; }
    .anim-sun    { transform-origin: 75% 13%; animation: dwSunRise 2.08s cubic-bezier(0.18,0,0.32,1) 0.7s both, dwSunPulse 8.67s 4.83s ease-in-out infinite; }
    .anim-wolf   { transform-origin: 78% 82%; animation: dwSlideIn 1.23s cubic-bezier(0.2,0,0.26,1) 0.37s both; }
    .anim-runner { transform-origin: 50% 82%; animation: dwSlideIn 1.23s cubic-bezier(0.2,0,0.26,1) 1.00s both; }
    .anim-bike   { transform-origin: 22% 80%; animation: dwSlideIn 1.23s cubic-bezier(0.2,0,0.26,1) 1.60s both; }
    .anim-name   { animation: dwFadeUp 1.1s  cubic-bezier(0.2,0,0.3,1) 3.30s both; }
    .anim-sub    { animation: dwFadeUp 0.87s ease-out 3.87s both; }
    .anim-soon   { animation: dwFadeUp 0.8s  ease-out 4.20s both; }
    .anim-store  { animation: dwFadeUp 0.8s  ease-out 4.45s both; }
    .anim-links  { animation: dwFadeUp 0.8s  ease-out 4.70s both; }
  </style>
</head>
<body>

<div id="scene" onclick="replayAnimations()">

  <div class="icon-stack">
    <img class="layer-base" src="uploads/G-Base_layer_at_1024x1024_canvas_size.png" alt="" />

    <div class="line-wrap anim-line1">
      <img class="layer-line1" src="uploads/BG_line1_layer_5_at_1024x1024_canvas_size.png" alt="" />
    </div>

    <div class="line-wrap anim-line2">
      <img class="layer-line2" src="uploads/BG_line2_layer_6_at_1024x1024_canvas_size.png" alt="" />
    </div>

    <img class="anim-sun"    src="uploads/Sun_layer_7_at_1024x1024_canvas_size.png"          alt="" />
    <img class="layer-figure anim-wolf"   src="uploads/Wolf_layer_2_at_1024x1024_canvas_size.png"      alt="" />
    <img class="layer-figure anim-runner" src="uploads/Runner_layer_3_at_1024x1024_canvas_size.png"    alt="" />
    <img class="layer-figure anim-bike"   src="uploads/Bicyclist_layer_4_at_1024x1024_canvas_size.png" alt="" />
  </div>

  <div class="wordmark">
    <div class="wm-name anim-name">DiaWolf</div>
    <div class="wm-sub  anim-sub">Exercise &amp; CGM Tracking</div>

    <div class="badge-soon anim-soon">Coming Soon</div>

    <div class="appstore-btn anim-store" onclick="event.stopPropagation()" title="App Store listing coming soon">
      <svg viewBox="0 0 384 512" width="23" height="23" fill="#fff" aria-hidden="true">
        <path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/>
      </svg>
      <div class="appstore-text">
        <span class="pre">Coming soon to the</span>
        <span class="main">App Store</span>
      </div>
    </div>

    <div class="link-row anim-links" onclick="event.stopPropagation()">
      <a class="subtle-link" href="privacy.html">Privacy Policy</a>
      <a class="subtle-link" href="https://www.facebook.com/profile.php?id=61591366718610" target="_blank" rel="noopener">Facebook</a>
      <a class="subtle-link" href="https://www.instagram.com/DiaWolf_App" target="_blank" rel="noopener">Instagram</a>
    </div>
  </div>

</div>

<script>
  function replayAnimations() {
    document.querySelectorAll('[class*="anim-"]').forEach(function(el) {
      var cls = el.getAttribute('class') || '';
      var stored = el._savedAnim;
      if (!stored) {
        stored = getComputedStyle(el).animation;
        el._savedAnim = stored;
      }
      el.style.animation = 'none';
      void el.offsetHeight;
      el.style.animation = stored;
    });
  }
</script>

</body>
</html>
